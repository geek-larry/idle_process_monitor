[DEFAULT]
# 调试日志开关，true开启，false关闭
debug.enabled=true

# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
log.level=DEBUG

# 配置缓存时间，单位秒
config.cache.duration=300

# 检查间隔，单位秒
check.interval=10

# 日志保留天数
log.keep.days=7

# 每次检查的最大进程数
max.processes.per.check=10

# 进程信息缓存时间，单位秒
process.cache.expiry=5

# 空闲判定模式：cumulative（累积计时）或 sliding_window（滑动窗口）
idle.detection.mode=sliding_window

# 滑动窗口长度，单位秒
sliding.window.length=1800

# 滑动窗口采样点数
sliding.window.size=180

# API地址
api.url=http://127.0.0.1:5000/api/process-configs
